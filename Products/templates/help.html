<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>API Help</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        h1, h2, h3 {
            color: #0f172a;
        }
        code {
            background: #f1f5f9;
            color: #111827;
            padding: 0.1rem 0.35rem;
            border-radius: 6px;
        }
        pre {
            background: #0b1020;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        pre code {
            background: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        th, td {
            border: 1px solid #d1d5db;
            padding: 0.5rem;
            text-align: left;
        }
        a {
            color: #0b5ed7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Help</h1>
        {{ content_html|safe }}
    </div>
</body>
</html>
