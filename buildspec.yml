version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID is required}
      - USERS_IMAGE_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${USERS_ECR_REPOSITORY}
      - PRODUCTS_IMAGE_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${PRODUCTS_ECR_REPOSITORY}
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
  build:
    commands:
      - echo Building the Users API image...
      - docker build -t ${USERS_ECR_REPOSITORY}:${IMAGE_TAG} -f Users/Dockerfile Users
      - docker tag ${USERS_ECR_REPOSITORY}:${IMAGE_TAG} ${USERS_IMAGE_URI}:${IMAGE_TAG}
      - echo Building the Products API image...
      - docker build -t ${PRODUCTS_ECR_REPOSITORY}:${IMAGE_TAG} -f Products/Dockerfile Products
      - docker tag ${PRODUCTS_ECR_REPOSITORY}:${IMAGE_TAG} ${PRODUCTS_IMAGE_URI}:${IMAGE_TAG}
  post_build:
    commands:
      - echo Pushing the Users API image...
      - docker push ${USERS_IMAGE_URI}:${IMAGE_TAG}
      - echo Pushing the Products API image...
      - docker push ${PRODUCTS_IMAGE_URI}:${IMAGE_TAG}
      - printf '[{"name":"users-api","imageUri":"%s"},{"name":"products-api","imageUri":"%s"}]' ${USERS_IMAGE_URI}:${IMAGE_TAG} ${PRODUCTS_IMAGE_URI}:${IMAGE_TAG} > imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
